name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - 'mkdocs.yml'
      - 'README.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'website/**'
      - 'mkdocs.yml'
      - 'README.md'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v4

      # ── MkDocs build ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir _site/mkdocs

      # ── Docusaurus build ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install Docusaurus dependencies
        working-directory: website
        run: npm ci

      - name: Run Docusaurus tests
        working-directory: website
        run: npm test

      - name: Build Docusaurus site
        working-directory: website
        run: npm run build

      - name: Copy Docusaurus output into combined site
        run: cp -r website/build _site/docusaurus

      # ── Landing page ──
      - name: Create root landing page
        run: cp docs/_landing/index.html _site/index.html

      - name: Upload combined artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
